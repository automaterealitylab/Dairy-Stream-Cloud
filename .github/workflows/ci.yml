name: CI Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend CI (Syntax, Lint & Tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check Server Syntax
        run: node --check server.js

      - name: Run ESLint
        run: npm run lint

      - name: Run Backend Test Suite
        run: npm test

  frontend:
    name: Frontend CI (Lint, Vitest & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest Suite
        run: npm run test

      - name: Build Production App
        run: npm run build

  android:
    name: Android APK CI (Java 17 & Gradle Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App & Sync Capacitor Android
        run: npm run build:android

      - name: Verify Capacitor Android Web Assets
        run: test -f android/app/src/main/assets/public/index.html

      - name: Run Android Gradle Unit Tests & Lint
        run: |
          cd android
          chmod +x gradlew
          ./gradlew testDebugUnitTest lintDebug --no-daemon

      - name: Build Android Debug APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Android Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dairyvision-android-apk
          path: Frontend/android/app/build/outputs/apk/debug/*.apk
